services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_URL: "http://ollama:11434/api/generate"
      OLLAMA_TIMEOUT: "150"
      MAX_DOCS_LLM: "2"
    command:
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - -w
      - "1"
      - -b
      - 0.0.0.0:8000
      - --timeout
      - "170"
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_models:
